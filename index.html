<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScanToText</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f7f7f7;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 28px;
    }
    p {
      font-size: 18px;
      margin: 20px 0;
    }
    input, button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      font-size: 16px;
    }
    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📱 Text the Seller Instantly</h1>
  <p>Enter your number and the seller will contact you right away.</p>

  <input type="tel" placeholder="Enter your phone number">

  <button>Notify Seller</button>

  <p style="font-size:12px; margin-top:20px;">
    By submitting, you agree to be contacted by the seller.
  </p>
</div>

</body>
</html>
