<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScanToText</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f7f7f7;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin: 5px 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      background: black;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }

    .small {
      font-size: 12px;
      margin-top: 10px;
      color: #555;
    }

    hr {
      margin: 25px 0;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🚗 Vehicle Information</h1>

    <p><strong>Year:</strong> 2020</p>
    <p><strong>Make:</strong> Toyota</p>
    <p><strong>Model:</strong> Camry</p>
    <p><strong>Mileage:</strong> 45,000 miles</p>

    <hr>

    <h2>📱 Contact the Seller</h2>
    <p>Enter your number and the seller will contact you soon.</p>

    <input type="tel" placeholder="Enter your phone number">
    <button>Notify Seller</button>

    <p class="small">
      By submitting, you agree to be contacted by the seller.
    </p>

  </div>

</body>
</html>
